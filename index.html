<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Memory Tree 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#07070f;color:#e2e8f0;font-family:"Space Grotesk",system-ui,sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#07070fdd;border-bottom:1px solid #1a1a2e;flex-shrink:0;flex-wrap:wrap;backdrop-filter:blur(10px);position:relative;z-index:50}
.logo{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#a78bfa;letter-spacing:.3px}
.badge{font-size:9px;color:#34d399;background:#34d39910;border:1px solid #34d39928;border-radius:20px;padding:2px 8px;letter-spacing:.5px}
.date{font-size:10px;color:#334155;margin-left:auto}
.srch{padding:5px 11px;border-radius:20px;background:#0f0f1f;border:1px solid #1a1a2e;color:#e2e8f0;font-size:11px;font-family:inherit;outline:none;width:120px;transition:border-color .2s}
.srch:focus{border-color:#a78bfa55}
.srch::placeholder{color:#2d2d4a}
.clr{background:none;border:none;color:#334155;cursor:pointer;font-size:12px}
.synbtn{padding:4px 10px;border-radius:20px;background:transparent;border:1px solid #1a1a2e;color:#64748b;font-size:10px;cursor:pointer;font-family:inherit}
.synbtn:hover{border-color:#a78bfa44;color:#a78bfa}
#wrap{flex:1;position:relative;overflow:hidden}
#c{display:block;width:100%;height:100%}
#labels{position:absolute;inset:0;pointer-events:none;z-index:10}
.nlbl{position:absolute;pointer-events:none;transform:translate(-50%,-140%)}
.nlbl .ntxt{font-size:9px;font-weight:600;padding:2px 8px;border-radius:10px;border:1px solid;background:rgba(7,7,15,.9);white-space:nowrap;letter-spacing:.3px}
.nlbl .nsub{font-size:7px;color:#334155;text-align:center;margin-top:2px;font-family:"Space Mono",monospace}
.flbl{position:absolute;pointer-events:none;transform:translate(-50%,-150%);display:none}
.flbl span{font-size:8.5px;font-weight:500;padding:2px 6px;border-radius:6px;background:#0a0a18;border:1px solid #1a1a2e;color:#94a3b8;white-space:nowrap}

/* ── FLOATING HUD CARD ── */
#hud{position:absolute;z-index:60;width:240px;pointer-events:all;display:none;filter:drop-shadow(0 8px 32px rgba(0,0,0,.7))}
#hud.show{display:block;animation:hudIn .2s ease-out}
@keyframes hudIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.hud-inner{background:rgba(8,9,22,.92);backdrop-filter:blur(18px);border:1px solid #1e1e35;border-radius:14px;overflow:hidden;position:relative}
.hud-accent{height:2px;background:linear-gradient(to right,var(--ac),transparent)}
.hud-head{display:flex;align-items:center;justify-content:space-between;padding:9px 12px 7px}
.hud-cat{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--ac)}
.hud-x{background:none;border:none;color:#334155;cursor:pointer;font-size:14px;line-height:1;padding:0 2px;transition:color .15s}
.hud-x:hover{color:#94a3b8}
.hud-name{font-size:13px;font-weight:600;color:#e2e8f0;padding:0 12px 8px;line-height:1.4}
.hud-full{font-size:10.5px;color:#94a3b8;line-height:1.6;padding:0 12px 10px;border-bottom:1px solid #1a1a2e}
.hud-row{padding:8px 12px;display:flex;flex-wrap:wrap;gap:4px}
.hud-row-lbl{font-size:8px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:#2d2d4a;padding:6px 12px 2px;width:100%}
.hud-pill{font-size:9px;padding:2px 8px;border-radius:10px;border:1px solid;cursor:pointer;transition:opacity .15s;background:transparent;font-family:inherit}
.hud-pill:hover{opacity:.75}
.hud-actions{display:flex;gap:6px;padding:8px 12px 10px}
.hud-copy{flex:1;padding:5px;border-radius:8px;background:#0f0f1f;border:1px solid #1a1a2e;color:#64748b;cursor:pointer;font-size:10px;font-family:inherit;transition:all .15s}
.hud-copy:hover{border-color:var(--ac);color:var(--ac)}
.hud-arrow{position:absolute;width:8px;height:8px;background:rgba(8,9,22,.92);border:1px solid #1e1e35;transform:rotate(45deg)}

/* Category HUD */
.hud-grid{display:flex;flex-wrap:wrap;gap:4px;padding:6px 12px 10px}
.hud-fact-btn{font-size:9px;padding:3px 8px;border-radius:8px;border:1px solid;cursor:pointer;transition:all .15s;background:transparent;font-family:inherit;text-align:left}
.hud-fact-btn:hover{opacity:.75}

/* Connector SVG */
#conn-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:55}

/* hint */
.hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:9.5px;color:#1e1e35;white-space:nowrap;pointer-events:none;z-index:10;transition:opacity 1s;letter-spacing:.3px}

/* search highlight pulse */
@keyframes searchPop{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <div class="logo">&#129504; Memory Tree</div>
  <div class="badge">3D</div>
  <span class="date" id="sd"></span>
  <input class="srch" id="srch" type="text" placeholder="search memories..." oninput="onSearch(this.value)">
  <button class="clr" id="clrBtn" style="display:none" onclick="clearSearch()">&#x2715;</button>
  <button class="synbtn" onclick="showModal()">&#8635; sync</button>
</div>
<div id="wrap">
  <canvas id="c"></canvas>

  <!-- Label layer -->
  <div id="labels">
    <div class="flbl" id="factLabel"><span id="factLabelTxt"></span></div>
  </div>

  <!-- Connector line SVG -->
  <svg id="conn-svg">
    <defs>
      <marker id="dot" markerWidth="4" markerHeight="4" refX="2" refY="2">
        <circle cx="2" cy="2" r="1.5" fill="#a78bfa" opacity="0.6"/>
      </marker>
    </defs>
    <line id="connLine" x1="0" y1="0" x2="0" y2="0"
      stroke="#a78bfa" stroke-width="1" stroke-opacity="0" stroke-dasharray="4 5"
      marker-end="url(#dot)"/>
  </svg>

  <!-- Floating HUD Card -->
  <div id="hud" style="--ac:#a78bfa">
    <div class="hud-inner" id="hudInner">
      <div class="hud-accent" id="hudAccent"></div>
      <div class="hud-head">
        <div class="hud-cat" id="hudCat"></div>
        <button class="hud-x" onclick="hideHud()">&#x2715;</button>
      </div>
      <div id="hudBody"></div>
    </div>
  </div>

  <div class="hint" id="hint">drag to rotate &nbsp;&bull;&nbsp; tap nodes to explore</div>
</div>
</div>

<!-- Sync modal -->
<div id="modal" style="display:none;position:fixed;inset:0;background:#000a;z-index:200;display:none;align-items:center;justify-content:center">
  <div style="background:#0a0a18;border:1px solid #1e1e35;border-radius:16px;padding:24px;width:360px;max-width:92vw">
    <div style="font-size:14px;font-weight:600;color:#e2e8f0;margin-bottom:8px">&#8635; How to sync</div>
    <p style="font-size:11px;color:#475569;line-height:1.7;margin-bottom:12px">When Claude learns something new, update in 3 steps:</p>
    <div style="font-size:11px;color:#94a3b8;line-height:1.8">
      1. In any Claude chat type <code style="font-family:monospace;background:#111;border:1px solid #1e1e35;border-radius:4px;padding:1px 5px;color:#a78bfa;font-size:10px">sync my memory tree</code><br>
      2. Find <code style="font-family:monospace;background:#111;border:1px solid #1e1e35;border-radius:4px;padding:1px 5px;color:#a78bfa;font-size:10px">MEMORY_DATA</code> in index.html and replace<br>
      3. Commit and push to GitHub
    </div>
    <button onclick="hideModal()" style="margin-top:16px;width:100%;padding:8px;border-radius:8px;background:#a78bfa18;border:1px solid #a78bfa44;color:#a78bfa;cursor:pointer;font-size:12px;font-family:inherit">Got it</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   DATA
══════════════════════════════════════ */
var MEMORY_DATA={lastSynced:"2026-07-14",categories:[
{id:"identity",label:"Identity",emoji:"\u{1F464}",ci:0,facts:[
{id:"i1",label:"Samyak Bhadke",full:"Full name: Samyak Bhadke"},
{id:"i2",label:"Nagpur, India",full:"Location: Nagpur, Maharashtra, India"},
{id:"i3",label:"SB Jain Institute",full:"College: SB Jain Institute of Technology, Management & Research"},
{id:"i4",label:"CSE 1st yr",full:"First-year CSE student. USN: CS25041"}]},
{id:"projects",label:"Projects",emoji:"\u{1F680}",ci:1,facts:[
{id:"p1",label:"Halcyon AI",full:"Halcyon: Hinglish AI assistant Android app (Java, Pollinations.ai + Groq + Gemini)"},
{id:"p2",label:"TaskBell v6",full:"TaskBell v6: Android reminder app (Room DB, AlarmManager, live/video bg theme)"},

{id:"challenge",label:"Challenge",emoji:"\u{1F3C6}",ci:2,facts:[
{id:"c1",label:"Day 1 Ambient",full:"Day 1 complete: Mood-Based Ambient Room"},
{id:"c2",label:"Day 2 Code Roast",full:"Day 2 complete: Code Roast Arena"},
{id:"c3",label:"Day 5 DevForge",full:"Day 5 complete: DevForge IDE"},

{id:"c6",label:"Day 8 HabitLoop",full:"Day 8 complete: HabitLoop offline habit tracker PWA"},
{id:"c7",label:"Day 9 JD Scan",full:"Day 9 complete: JD Bias Scanner"},
{id:"c8",label:"7/15 done",full:"15-Day Build Challenge: 7 of 15 complete — single-file HTML/CSS/JS + Pollinations.ai"}]},
{id:"stack",label:"Stack",emoji:"\u2699\uFE0F",ci:3,facts:[
{id:"s1",label:"Android+Java",full:"Android in Java: main mobile stack (Room DB, AlarmManager, RecyclerView)"},
{id:"s2",label:"HTML/CSS/JS",full:"Vanilla HTML/CSS/JS: default for single-file projects and 15-Day Challenge"},
{id:"s3",label:"React+Electron",full:"React + Electron: used for ORBIT DOCK desktop hub"},
{id:"s4",label:"Pollinations.ai",full:"Pollinations.ai: free keyless AI backend (text + image) — core of all challenge projects"},
{id:"s5",label:"Groq+Gemini",full:"Groq (llama-3.3-70b) + Gemini API: AI fallbacks alongside Pollinations"},
{id:"s6",label:"GitHub Pages",full:"GitHub Pages: main deploy — samyakb32-sys (Android), samyakbcse25 (web/college)"},
{id:"s7",label:"Vercel+Supabase",full:"Vercel + Supabase: used for Shoply marketplace"},
{id:"s8",label:"Three.js+GSAP",full:"Three.js + GSAP: 3D scenes and scroll animations"}]},
{id:"prefs",label:"Prefs",emoji:"\u{1F3AF}",ci:4,facts:[
{id:"pr1",label:"Hinglish",full:"Communicates in Hinglish (Hindi-English mix). Claude always responds in Hinglish"},
{id:"pr2",label:"Phone-first",full:"Phone-first workflow; GitHub Actions for cloud APK builds when laptop unavailable"},
{id:"pr3",label:"Anime+One Piece",full:"Interests: anime, streetwear aesthetics, One Piece"},
{id:"pr4",label:"Free APIs",full:"Prefers free/keyless AI APIs — Pollinations.ai is the cornerstone"},
{id:"pr5",label:"Neutral UI",full:"Standard/neutral styling by default — NOT dark/neon unless specifically asked"},
{id:"pr6",label:"Freelancer.in",full:"Prefers no-interview freelance on Freelancer.in over Internshala"}]},
{id:"design",label:"Design",emoji:"\u{1F3A8}",ci:5,facts:[
{id:"d1",label:"animmasterlib",full:"animmasterlib.dev: animation library for page-load and scroll"},
{id:"d2",label:"skiper-ui",full:"skiper-ui.com: modern UI component library"},
{id:"d3",label:"vengenceui",full:"vengenceui.com: bold dark UI library"},
{id:"d4",label:"motionsites.ai",full:"motionsites.ai: 7 signature motions — aurora, fluid, magnetic, noise field"},
{id:"d5",label:"getdesign.md",full:"getdesign.md: brand design systems and tokens (Vercel, Linear, Framer style)"},
{id:"d6",label:"21st.dev",full:"21st.dev: featured React UI components"},
{id:"d7",label:"dialedweb",full:"dialedweb.com: premium agency website reference"},
{id:"d8",label:"rocket.new",full:"rocket.new/templates: landing page template references"},
{id:"d9",label:"dotmatrix",full:"dotmatrix.zzzzshawn.cloud: dot matrix loader animations"}]}
]};

var CROSS={
  tech:[["p1","s4"],["p1","s5"],["p1","s1"],["p2","s1"],["p3","s3"],
        ["p4","s1"],["p5","s1"],["p5","s4"],["p6","s8"],["p6","s6"],
        ["p7","s7"],["p8","s4"],["p8","s6"],["p9","s2"]],
  challenge:[["c1","s4"],["c2","s4"],["c3","s4"],["c4","s4"],
             ["c5","s4"],["c6","s4"],["c7","s4"],["c8","s2"],["c8","s4"]],
  design:[["d1","p6"],["d4","p6"],["d5","p9"],["d2","p9"],["d8","p9"]]
};
var CROSS_HEX={tech:"#60a5fa",challenge:"#34d399",design:"#f472b6"};
var CROSS_INT={tech:0x60a5fa,challenge:0x34d399,design:0xf472b6};

var PAL=[
  {c:"#a78bfa",h:0xa78bfa},{c:"#60a5fa",h:0x60a5fa},{c:"#34d399",h:0x34d399},
  {c:"#fbbf24",h:0xfbbf24},{c:"#f97316",h:0xf97316},{c:"#f472b6",h:0xf472b6}
];

/* ══════════════════════════════════════
   THREE.JS SETUP
══════════════════════════════════════ */
var wrap=document.getElementById("wrap");
var canvas=document.getElementById("c");
var scene=new THREE.Scene();
scene.background=new THREE.Color(0x07070f);
var W=wrap.clientWidth,H=wrap.clientHeight;
var camera=new THREE.PerspectiveCamera(55,W/H,0.1,5000);
camera.position.set(0,0,520);
var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(W,H);

/* Stars */
(function(){
  var pts=[];
  for(var i=0;i<500;i++)pts.push((Math.random()-.5)*2400,(Math.random()-.5)*2400,(Math.random()-.5)*2400);
  var g=new THREE.BufferGeometry();
  g.setAttribute("position",new THREE.Float32BufferAttribute(pts,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:1.3,transparent:true,opacity:0.3})));
})();

/* Lights */
scene.add(new THREE.AmbientLight(0xffffff,0.7));
var pl1=new THREE.PointLight(0xa78bfa,1.8,700);pl1.position.set(60,120,200);scene.add(pl1);
var pl2=new THREE.PointLight(0x60a5fa,1.0,500);pl2.position.set(-120,-80,150);scene.add(pl2);

/* Pivot group — everything rotates here */
var pivot=new THREE.Group();
scene.add(pivot);

/* ══════════════════════════════════════
   BUILD 3D SCENE
══════════════════════════════════════ */
var clickable=[];
var catMesh={},factMesh={},catPos3D={},factPos3D={};
var crossLines=[];
var catLabels=[];
var CATS=MEMORY_DATA.categories;

function mkLine(pts,col,op){
  var g=new THREE.BufferGeometry().setFromPoints(pts);
  var m=new THREE.LineBasicMaterial({color:col,transparent:true,opacity:op});
  return new THREE.Line(g,m);
}
function fibSphere(n,r){
  var pts=[],phi=Math.PI*(3-Math.sqrt(5));
  for(var i=0;i<n;i++){
    var y=1-(i/Math.max(n-1,1))*2,rad=Math.sqrt(Math.max(0,1-y*y)),t=phi*i;
    pts.push(new THREE.Vector3(r*rad*Math.cos(t),r*y,r*rad*Math.sin(t)));
  }
  return pts;
}
function mkLbl(id,txt,sub,col){
  var d=document.createElement("div");
  d.className="nlbl";d.id="lbl_"+id;
  d.innerHTML='<div class="ntxt" style="color:'+col+';border-color:'+col+'33">'+txt+'</div>'+(sub?'<div class="nsub">'+sub+'</div>':'');
  document.getElementById("labels").appendChild(d);
  return d;
}
function to2D(v){
  var c=v.clone().project(camera);
  return{x:(c.x*.5+.5)*renderer.domElement.clientWidth,
         y:(1-(c.y*.5+.5))*renderer.domElement.clientHeight,
         z:c.z};
}

/* Center brain */
pivot.add((function(){
  var g=new THREE.SphereGeometry(28,32,32);
  var m=new THREE.MeshPhongMaterial({color:0x4c1d95,emissive:0x2a0864,shininess:80});
  var mesh=new THREE.Mesh(g,m);
  var gw=new THREE.Mesh(new THREE.SphereGeometry(40,16,16),
    new THREE.MeshBasicMaterial({color:0xa78bfa,transparent:true,opacity:0.05,side:THREE.BackSide}));
  var grp=new THREE.Group();grp.add(mesh);grp.add(gw);return grp;
})());
var brainLbl=mkLbl("brain","\u{1F9E0} Samyak","core","#a78bfa");

/* Categories + facts */
CATS.forEach(function(cat,i){
  var elev=(i%2===0?1:-1)*28*Math.PI/180;
  var az=(i*60)*Math.PI/180;
  var R=190;
  var cx=R*Math.cos(elev)*Math.cos(az),cy=R*Math.sin(elev),cz=R*Math.cos(elev)*Math.sin(az);
  catPos3D[cat.id]={x:cx,y:cy,z:cz};
  var pl=PAL[cat.ci];

  /* Cat sphere */
  var cg=new THREE.SphereGeometry(14,16,16);
  var cm=new THREE.MeshPhongMaterial({color:pl.h,emissive:new THREE.Color(pl.h).multiplyScalar(0.25),shininess:100});
  var cmesh=new THREE.Mesh(cg,cm);
  cmesh.position.set(cx,cy,cz);
  cmesh.userData={type:"cat",cat:cat};
  pivot.add(cmesh);clickable.push(cmesh);catMesh[cat.id]=cmesh;

  /* Cat glow */
  var cgl=new THREE.Mesh(new THREE.SphereGeometry(20,8,8),
    new THREE.MeshBasicMaterial({color:pl.h,transparent:true,opacity:0.06,side:THREE.BackSide}));
  cgl.position.set(cx,cy,cz);pivot.add(cgl);

  /* Center → cat line */
  pivot.add(mkLine([new THREE.Vector3(0,0,0),new THREE.Vector3(cx,cy,cz)],pl.h,0.25));

  /* Label */
  var lbl=mkLbl(cat.id,cat.emoji+" "+cat.label,cat.facts.length+" nodes",pl.c);
  catLabels.push({el:lbl,p:new THREE.Vector3(cx,cy,cz),cat:cat});

  /* Facts */
  var fpts=fibSphere(cat.facts.length,70);
  cat.facts.forEach(function(fact,fi){
    var fp=fpts[fi];
    var wx=cx+fp.x,wy=cy+fp.y,wz=cz+fp.z;
    factPos3D[fact.id]={x:wx,y:wy,z:wz};
    var fm=new THREE.Mesh(new THREE.SphereGeometry(5,8,8),
      new THREE.MeshPhongMaterial({color:pl.h,emissive:new THREE.Color(pl.h).multiplyScalar(0.15),transparent:true,opacity:0.8,shininess:60}));
    fm.position.set(wx,wy,wz);
    fm.userData={type:"fact",fact:fact,cat:cat};
    pivot.add(fm);clickable.push(fm);factMesh[fact.id]=fm;
    pivot.add(mkLine([new THREE.Vector3(cx,cy,cz),new THREE.Vector3(wx,wy,wz)],pl.h,0.12));
  });
});

/* Cross-connections */
Object.keys(CROSS).forEach(function(type){
  CROSS[type].forEach(function(pair){
    var p1=factPos3D[pair[0]],p2=factPos3D[pair[1]];
    if(!p1||!p2)return;
    var line=mkLine([new THREE.Vector3(p1.x,p1.y,p1.z),new THREE.Vector3(p2.x,p2.y,p2.z)],CROSS_INT[type],0.1);
    crossLines.push({line:line,pair:pair,type:type});
    pivot.add(line);
  });
});

/* ══════════════════════════════════════
   STATE + HUD
══════════════════════════════════════ */
var activeCat=null,selFact=null,query="";
var hudNode3D=null; /* The 3D Vector3 of the active node (world-local) */

function catForFact(fid){
  var r=null;CATS.forEach(function(c){c.facts.forEach(function(f){if(f.id===fid)r=c.id;});});return r;
}
function findFact(fid){
  var r=null;CATS.forEach(function(c){c.facts.forEach(function(f){if(f.id===fid)r={fact:f,cat:c};});});return r;
}
function getConn(fact){
  var res=[],all=CROSS.tech.concat(CROSS.challenge).concat(CROSS.design);
  var types=[];
  CROSS.tech.forEach(function(){types.push("tech");});
  CROSS.challenge.forEach(function(){types.push("challenge");});
  CROSS.design.forEach(function(){types.push("design");});
  all.forEach(function(p,i){
    if(p[0]===fact.id)res.push({id:p[1],t:types[i]});
    else if(p[1]===fact.id)res.push({id:p[0],t:types[i]});
  });
  return res;
}

function showHudFact(fact,cat,nodeLocalPos){
  selFact=fact;activeCat=cat.id;
  hudNode3D=nodeLocalPos.clone();
  var pl=PAL[cat.ci];
  var hud=document.getElementById("hud");
  hud.style.setProperty("--ac",pl.c);
  document.getElementById("hudAccent").style.background="linear-gradient(to right,"+pl.c+",transparent)";
  document.getElementById("hudCat").textContent=cat.emoji+"  "+cat.label.toUpperCase();
  document.getElementById("hudCat").style.color=pl.c;
  var conn=getConn(fact);
  var connHTML="";
  if(conn.length){
    connHTML='<div class="hud-row-lbl">connected to</div><div class="hud-row">';
    conn.forEach(function(c){
      var r=findFact(c.id);if(!r)return;
      var col=CROSS_HEX[c.t];
      connHTML+='<button class="hud-pill" style="color:'+col+';border-color:'+col+'44" data-fid="'+r.fact.id+'">'+r.fact.label+'</button>';
    });
    connHTML+='</div>';
  }
  document.getElementById("hudBody").innerHTML=
    '<div class="hud-name">'+fact.label+'</div>'+
    '<div class="hud-full">'+fact.full+'</div>'+
    connHTML+
    '<div class="hud-actions"><button class="hud-copy" id="hcopy">&#128203; copy</button></div>';
  document.getElementById("hcopy").onclick=function(){navigator.clipboard&&navigator.clipboard.writeText(fact.full).catch(function(){});};
  document.querySelectorAll(".hud-pill").forEach(function(btn){
    btn.addEventListener("click",function(){
      var r=findFact(btn.dataset.fid);if(!r)return;
      var fp=factPos3D[r.fact.id];
      showHudFact(r.fact,r.cat,new THREE.Vector3(fp.x,fp.y,fp.z));
      updateHighlights();
    });
  });
  hud.classList.remove("show");
  void hud.offsetWidth;
  hud.classList.add("show");
  updateHighlights();
}

function showHudCat(cat,nodeLocalPos){
  selFact=null;activeCat=cat.id;
  hudNode3D=nodeLocalPos.clone();
  var pl=PAL[cat.ci];
  var hud=document.getElementById("hud");
  hud.style.setProperty("--ac",pl.c);
  document.getElementById("hudAccent").style.background="linear-gradient(to right,"+pl.c+",transparent)";
  document.getElementById("hudCat").textContent=cat.emoji+"  "+cat.label.toUpperCase();
  document.getElementById("hudCat").style.color=pl.c;
  var factsHTML='<div class="hud-row-lbl">'+cat.facts.length+' memories</div><div class="hud-grid">';
  cat.facts.forEach(function(fact){
    factsHTML+='<button class="hud-fact-btn" style="color:'+pl.c+';border-color:'+pl.c+'33" data-fid="'+fact.id+'">'+fact.label+'</button>';
  });
  factsHTML+='</div>';
  document.getElementById("hudBody").innerHTML=factsHTML;
  document.querySelectorAll(".hud-fact-btn").forEach(function(btn){
    btn.addEventListener("click",function(){
      var r=findFact(btn.dataset.fid);if(!r)return;
      var fp=factPos3D[r.fact.id];
      showHudFact(r.fact,r.cat,new THREE.Vector3(fp.x,fp.y,fp.z));
      updateHighlights();
    });
  });
  hud.classList.remove("show");
  void hud.offsetWidth;
  hud.classList.add("show");
  updateHighlights();
}

function hideHud(){
  document.getElementById("hud").classList.remove("show");
  setTimeout(function(){document.getElementById("hud").style.display="none";},200);
  activeCat=null;selFact=null;hudNode3D=null;
  document.getElementById("connLine").setAttribute("stroke-opacity","0");
  updateHighlights();
}

/* Position the HUD card near the node */
function positionHud(){
  var hud=document.getElementById("hud");
  if(!hudNode3D||!hud.classList.contains("show"))return;
  var wv=hudNode3D.clone();
  pivot.localToWorld(wv);
  var p=to2D(wv);
  if(p.z>1){hud.style.opacity="0";return;}
  hud.style.opacity="1";
  var sw=wrap.clientWidth,sh=wrap.clientHeight;
  var cw=244,ch=hud.offsetHeight||200;
  var margin=14;
  var x,y,arrowSide;
  /* Horizontal: prefer right side */
  if(p.x+30+cw+margin<=sw){x=p.x+30;arrowSide="left";}
  else if(p.x-30-cw-margin>=0){x=p.x-30-cw;arrowSide="right";}
  else{x=Math.max(margin,Math.min(p.x-cw/2,sw-cw-margin));arrowSide="none";}
  /* Vertical: center on node, clamp */
  y=Math.max(margin,Math.min(p.y-ch/2,sh-ch-margin));
  hud.style.left=x+"px";
  hud.style.top=y+"px";

  /* Connector line */
  var cl=document.getElementById("connLine");
  /* Line from node to nearest card edge */
  var cardMidY=y+ch/2;
  var ex=arrowSide==="left"?x:x+cw;
  cl.setAttribute("x1",p.x);cl.setAttribute("y1",p.y);
  cl.setAttribute("x2",ex);cl.setAttribute("y2",cardMidY);
  var ac=PAL[activeCat?CATS.find(function(c){return c.id===activeCat;})||{ci:0}:{}];
  var acColor=activeCat?PAL[CATS.find(function(c){return c.id===activeCat;}).ci].c:"#a78bfa";
  cl.setAttribute("stroke",acColor);
  cl.setAttribute("stroke-opacity","0.35");
}

/* Node highlight updates */
function updateHighlights(){
  CATS.forEach(function(cat){
    var cm=catMesh[cat.id],isA=activeCat===cat.id;
    cm.scale.setScalar(isA?1.3:1);
    cm.material.emissive=new THREE.Color(PAL[cat.ci].h).multiplyScalar(isA?0.45:0.22);
    cat.facts.forEach(function(f){
      var fm=factMesh[f.id];
      var isSel=selFact&&selFact.id===f.id;
      var inQ=query&&(f.label.toLowerCase().indexOf(query)>=0||f.full.toLowerCase().indexOf(query)>=0);
      fm.scale.setScalar(isSel?2.6:inQ?2:isA?1.4:1);
      fm.material.opacity=isSel?1:inQ?0.95:isA?0.85:query?0.18:0.75;
    });
  });
  crossLines.forEach(function(cl){
    var isActive=selFact&&(selFact.id===cl.pair[0]||selFact.id===cl.pair[1]);
    var isCatA=activeCat&&(catForFact(cl.pair[0])===activeCat||catForFact(cl.pair[1])===activeCat);
    cl.line.material.opacity=isActive?0.75:isCatA?0.38:0.08;
  });
}

/* ══════════════════════════════════════
   INTERACTION
══════════════════════════════════════ */
var isDrag=false,prevX=0,prevY=0,rotY=0,rotX=0,autoRot=true,moved=false;

wrap.addEventListener("mousedown",function(e){isDrag=true;moved=false;prevX=e.clientX;prevY=e.clientY;autoRot=false;});
window.addEventListener("mousemove",function(e){
  if(!isDrag)return;
  var dx=e.clientX-prevX,dy=e.clientY-prevY;
  if(Math.abs(dx)+Math.abs(dy)>2)moved=true;
  rotY+=dx*.006;rotX+=dy*.006;rotX=Math.max(-1.1,Math.min(1.1,rotX));
  pivot.rotation.y=rotY;pivot.rotation.x=rotX;
  prevX=e.clientX;prevY=e.clientY;
});
window.addEventListener("mouseup",function(){isDrag=false;setTimeout(function(){autoRot=true;},3000);});
wrap.addEventListener("wheel",function(e){camera.position.z=Math.max(200,Math.min(900,camera.position.z+e.deltaY*.5));},{passive:true});

/* Touch */
var pinch0=0;
wrap.addEventListener("touchstart",function(e){
  isDrag=true;moved=false;prevX=e.touches[0].clientX;prevY=e.touches[0].clientY;
  if(e.touches.length===2){var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pinch0=Math.sqrt(dx*dx+dy*dy);}
  autoRot=false;
},{passive:true});
wrap.addEventListener("touchmove",function(e){
  if(e.touches.length===2){
    var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
    var d=Math.sqrt(dx*dx+dy*dy);camera.position.z=Math.max(200,Math.min(900,camera.position.z-(d-pinch0)*.7));pinch0=d;return;
  }
  var ddx=e.touches[0].clientX-prevX,ddy=e.touches[0].clientY-prevY;
  if(Math.abs(ddx)+Math.abs(ddy)>3)moved=true;
  rotY+=ddx*.007;rotX+=ddy*.007;rotX=Math.max(-1.1,Math.min(1.1,rotX));
  pivot.rotation.y=rotY;pivot.rotation.x=rotX;
  prevX=e.touches[0].clientX;prevY=e.touches[0].clientY;
},{passive:true});
wrap.addEventListener("touchend",function(e){
  if(!moved)handleClick(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
  isDrag=false;setTimeout(function(){autoRot=true;},3000);
});

/* Raycast click */
var rc=new THREE.Raycaster(),mouse=new THREE.Vector2();
wrap.addEventListener("click",function(e){if(!moved)handleClick(e.clientX,e.clientY);moved=false;});
function handleClick(cx,cy){
  var rect=wrap.getBoundingClientRect();
  mouse.x=((cx-rect.left)/rect.width)*2-1;
  mouse.y=-((cy-rect.top)/rect.height)*2+1;
  rc.setFromCamera(mouse,camera);
  var hits=rc.intersectObjects(clickable);
  if(!hits.length){return;}
  var ud=hits[0].object.userData;
  document.getElementById("hint").style.opacity="0";
  if(ud.type==="cat"){
    if(activeCat===ud.cat.id){hideHud();return;}
    showHudCat(ud.cat,ud.cat===ud.cat?hits[0].object.position:new THREE.Vector3(catPos3D[ud.cat.id].x,catPos3D[ud.cat.id].y,catPos3D[ud.cat.id].z));
  } else {
    if(selFact&&selFact.id===ud.fact.id){hideHud();return;}
    showHudFact(ud.fact,ud.cat,hits[0].object.position);
  }
}

/* ══════════════════════════════════════
   ANIMATION LOOP
══════════════════════════════════════ */
function animate(){
  requestAnimationFrame(animate);
  if(autoRot&&!isDrag){rotY+=0.003;pivot.rotation.y=rotY;}
  pl1.intensity=1.3+Math.sin(Date.now()*.0015)*.5;

  /* Brain label */
  var bw=new THREE.Vector3(0,0,0);pivot.localToWorld(bw);
  var bp=to2D(bw);
  if(bp.z<1){brainLbl.style.left=bp.x+"px";brainLbl.style.top=bp.y+"px";brainLbl.style.display="block";}
  else brainLbl.style.display="none";

  /* Category labels */
  catLabels.forEach(function(cl){
    var wv=cl.p.clone();pivot.localToWorld(wv);
    var p2=to2D(wv);
    if(p2.z>1){cl.el.style.display="none";return;}
    cl.el.style.left=p2.x+"px";cl.el.style.top=p2.y+"px";cl.el.style.display="block";
    cl.el.style.opacity=(!activeCat||activeCat===cl.cat.id)?"1":"0.35";
  });

  /* HUD position update */
  positionHud();

  renderer.render(scene,camera);
}
animate();

/* ══════════════════════════════════════
   SEARCH
══════════════════════════════════════ */
function onSearch(v){
  query=v.trim().toLowerCase();
  document.getElementById("clrBtn").style.display=v?"inline-block":"none";
  selFact=null;updateHighlights();
}
function clearSearch(){document.getElementById("srch").value="";onSearch("");}

/* ══════════════════════════════════════
   MODAL / RESIZE
══════════════════════════════════════ */
function showModal(){document.getElementById("modal").style.display="flex";}
function hideModal(){document.getElementById("modal").style.display="none";}
window.addEventListener("resize",function(){
  W=wrap.clientWidth;H=wrap.clientHeight;
  camera.aspect=W/H;camera.updateProjectionMatrix();
  renderer.setSize(W,H);
});

/* INIT */
document.getElementById("sd").textContent=MEMORY_DATA.lastSynced;
setTimeout(function(){document.getElementById("hint").style.opacity="0";},5000);
</script>
